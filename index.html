<!DOCTYPE html>
<html lang="es">
<head>
  
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Crosti Cookies — Sistema de Gestión de Franquicias. Acceso corporativo para operarios, franquiciados y administración central.">
  <meta name="theme-color" content="#7B1D2A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Crosti Cookies — Acceso Corporativo</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --granate: #7B1D2A;
      --granate-deep: #5C1420;
      --granate-light: #9E2535;
      --crema: #FFF8F0;
      --crema-dark: #F5EBD8;
      --blanco: #FFFFFF;
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --text-dark: #2D1B1E;
      --text-muted: #8B6B72;
      --error: #E53E3E;
      --success: #38A169;
      --shadow-lg: 0 25px 50px rgba(123,29,42,0.35);
      --shadow-md: 0 10px 30px rgba(123,29,42,0.20);
      --radius: 20px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, var(--granate-deep) 0%, var(--granate) 40%, #A82535 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background circles */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
    }

    /* Cookie shape decorations */
    .deco-cookie {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.06;
    }
    .deco-cookie-1 {
      width: 320px; height: 320px;
      background: var(--gold);
      top: -80px; left: 15%;
      animation: float 8s ease-in-out infinite;
    }
    .deco-cookie-2 {
      width: 200px; height: 200px;
      background: var(--crema);
      bottom: 5%; right: 10%;
      animation: float 6s ease-in-out infinite reverse;
    }
    .deco-cookie-3 {
      width: 120px; height: 120px;
      background: var(--gold);
      bottom: 25%; left: 5%;
      animation: float 10s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(8deg); }
    }

    /* Card container */
    .login-card {
      background: var(--crema);
      border-radius: var(--radius);
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 10;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo section */
    .logo-section {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--granate) 0%, var(--granate-light) 100%);
      border-radius: 22px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(123,29,42,0.40);
      position: relative;
    }

    .logo-badge svg {
      width: 46px; height: 46px;
      fill: var(--gold);
    }

    .brand-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--granate);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .brand-sub {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--crema-dark), transparent);
      margin: 24px 0;
    }

    /* Form */
    .form-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid transparent;
      border-radius: 12px;
      background: var(--blanco);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      transition: all 0.2s ease;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    input:focus {
      border-color: var(--granate);
      box-shadow: 0 0 0 4px rgba(123,29,42,0.10);
    }

    input.error-input {
      border-color: var(--error);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px;
      display: flex; align-items: center;
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--granate) 0%, var(--granate-light) 100%);
      color: var(--blanco);
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 20px rgba(123,29,42,0.35);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(123,29,42,0.45);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.7; cursor: not-allowed; transform: none;
    }

    .btn-login .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert messages */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .alert.show { display: flex; }
    .alert-error { background: #FFF0F0; color: var(--error); border: 1px solid #FFC0C0; }
    .alert-info { background: #FFF8E8; color: #8B6000; border: 1px solid #F0D080; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .login-footer span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .version-badge {
      background: var(--granate);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; margin: 16px; }
      .brand-name { font-size: 22px; }
    }
  </style>
</head>
<body>
  <!-- Decoraciones visuales -->
  <div class="deco-cookie deco-cookie-1"></div>
  <div class="deco-cookie deco-cookie-2"></div>
  <div class="deco-cookie deco-cookie-3"></div>

  <div class="login-card" role="main">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-badge" aria-hidden="true">
        <!-- Cookie SVG icon -->
        <img src="/logo.png" alt="Crosti Cookies Logo" style="width: 46px; height: 46px; border-radius: 12px; object-fit: contain;">
      </div>
      <div class="brand-name">CROSTI COOKIES</div>
      <div class="brand-sub">Sistema de Gestión</div>
    </div>

    <div class="divider"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <p class="form-title">Acceso corporativo</p>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="operario@crosticookies.com"
          required
          inputmode="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          >
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Iniciar Sesión</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>

      <div class="alert alert-error" id="alertError" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg">Error de autenticación</span>
      </div>

      <div class="alert alert-info" id="alertInfo" role="status">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Redirigiendo a tu panel...</span>
      </div>
    </form>

    <div class="login-footer">
      <span>
        <span class="version-badge">v1.1</span>
        &nbsp;Crosti Cookies © 2027 &nbsp;·&nbsp; Barcelona
      </span>
    </div>
  </div>

  <script>
    // ─── CONFIGURACIÓN ───────────────────────────────────────
    const API_BASE = '';  // mismo origen (Cloudflare Pages)
    const DASHBOARD_MAP = {
      'OPERARIO': './dashboard-operario.html',
      'FRANQUICIADO': './dashboard-franquiciado.html',
      'ADMIN': './dashboard-admin.html',
    };

    // ─── VERIFICAR SESIÓN ACTIVA ─────────────────────────────
    (function checkSession() {
      const token = localStorage.getItem('cc_token');
      const rol = localStorage.getItem('cc_rol');
      if (token && rol && DASHBOARD_MAP[rol]) {
        window.location.href = DASHBOARD_MAP[rol];
      }
    })();

    // ─── TOGGLE CONTRASEÑA ──────────────────────────────────
    const togglePass = document.getElementById('togglePass');
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePass.addEventListener('click', () => {
      const isPassword = passInput.type === 'password';
      passInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
               <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    // ─── FORM SUBMIT ─────────────────────────────────────────
    const form = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const alertError = document.getElementById('alertError');
    const alertMsg = document.getElementById('alertMsg');
    const alertInfo = document.getElementById('alertInfo');

    function setLoading(loading) {
      btnLogin.disabled = loading;
      btnText.style.display = loading ? 'none' : 'block';
      btnSpinner.style.display = loading ? 'block' : 'none';
    }

    function showError(msg) {
      alertError.classList.add('show');
      alertInfo.classList.remove('show');
      alertMsg.textContent = msg;
      document.getElementById('email').classList.toggle('error-input', true);
      document.getElementById('password').classList.toggle('error-input', true);
    }

    function clearErrors() {
      alertError.classList.remove('show');
      document.getElementById('email').classList.remove('error-input');
      document.getElementById('password').classList.remove('error-input');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Credenciales incorrectas. Verifica tus datos.');
          return;
        }

        // Guardar sesión en localStorage
        localStorage.setItem('cc_token', data.token);
        localStorage.setItem('cc_rol', data.rol);
        localStorage.setItem('cc_tienda', data.id_tienda || '');
        localStorage.setItem('cc_nombre', data.nombre || '');

        // Mostrar redirect
        alertInfo.classList.add('show');

        // Redirigir según rol
        setTimeout(() => {
          window.location.href = DASHBOARD_MAP[data.rol] || './dashboard-operario.html';
        }, 800);

      } catch (err) {
        showError('Error de conexión. Verifica tu red e inténtalo de nuevo.');
      } finally {
        setLoading(false);
      }
    });

    // ─── PWA SERVICE WORKER ──────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[CC PWA] SW registrado:', reg.scope))
          .catch(err => console.error('[CC PWA] SW error:', err));
      });
    }
  </script>
</body>
</html>
